<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão RH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo">
            <h2>✨ Meu RH</h2>
        </div>
        <nav class="menu">
            <button class="menu-item ativo" onclick="mudarAba(event, 'tela-dashboard')">📊 Dashboard</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-admissao')">📝 Nova Admissão</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-equipe')">👥 Equipe</button>
        </nav>
    </aside>

    <main class="main-content">

        <!-- TELA 1: DASHBOARD -->
        <section id="tela-dashboard" class="aba ativa">
            <div class="header-tela">
                <h1>Painel de Controle</h1>
                <p>Visão geral do RH e Lembretes</p>
            </div>
            
            <div class="dashboard-grid">
                <div class="coluna-cards">
                    <div class="card card-destaque">
                        <h3>Total de Funcionários</h3>
                        <div class="numero-circulo circulo-roxo" id="contador-funcionarios">0</div>
                    </div>
                    <div class="card card-destaque">
                        <h3>Funcionários em Férias</h3>
                        <div class="numero-circulo circulo-laranja" id="contador-ferias">0</div>
                    </div>
                    <div class="card card-destaque">
                        <h3>🎂 Aniversariantes do Mês</h3>
                        <ul id="lista-aniversariantes" class="lista-simples"></ul>
                    </div>
                </div>

                <div class="coluna-ferramentas">
                    <div class="card" style="padding: 20px;">
                        <div class="calendario-header">
                            <div>
                                <h3 id="mes-ano-display" style="font-size: 18px; color: #1a202c; font-weight: 800;">MÊS ANO</h3>
                            </div>
                            <div>
                                <button class="btn-cal" onclick="mudarMes(-1)">&#10094;</button>
                                <button class="btn-cal" onclick="mudarMes(1)">&#10095;</button>
                            </div>
                        </div>
                        
                        <div class="dias-semana">
                            <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
                        </div>
                        <div id="dias-grid" class="dias-grid">
                            <!-- JS preenche os dias aqui -->
                        </div>
                    </div>

                    <div class="card" id="painel-notas-dia" style="display: none; border-left: 4px solid #00C4CC;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h3 id="titulo-notas-dia" style="color: #00C4CC; font-weight: 800;">Anotações do Dia</h3>
                            <button onclick="fecharNotasDia()" style="background:none; border:none; cursor:pointer; font-size: 16px; color: #a0aec0;">✖</button>
                        </div>
                        <textarea id="texto-nota-dia" placeholder="Escreva recados, faltas ou atestados para esta data..." style="width: 100%; min-height: 100px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; resize: vertical; outline: none; margin-bottom: 10px;"></textarea>
                        <button class="btn-acao btn-editar" onclick="salvarNotaDia()" style="width: 100%; padding: 12px;">Salvar Anotação</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- TELA 2: NOVA ADMISSÃO -->
        <section id="tela-admissao" class="aba">
            <div class="container">
                <h1>Novo Funcionário</h1>
                <form id="formFuncionario">
                    <div class="form-group full-width">
                        <label for="nome">👤 Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Ex: João da Silva">
                    </div>
                    <div class="form-group">
                        <label for="cpf">🆔 CPF</label>
                        <input type="text" id="cpf" required placeholder="000.000.000-00">
                    </div>
                    <div class="form-group">
                        <label for="dataNascimento">🎈 Data de Nascimento</label>
                        <input type="date" id="dataNascimento" required>
                    </div>
                    <div class="form-group">
                        <label for="dataAdmissao">📅 Data de Admissão</label>
                        <input type="date" id="dataAdmissao" required>
                    </div>
                    <div class="form-group">
                        <label for="statusFunc">🟢 Status Inicial</label>
                        <select id="statusFunc" required class="input-padrao">
                            <option value="Ativo">🟢 Ativo</option>
                            <option value="Férias">🟠 De Férias</option>
                            <option value="Afastado">🔴 Afastado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="departamento">🏢 Departamento</label>
                        <input type="text" id="departamento" required placeholder="Ex: Tecnologia">
                    </div>
                    <div class="form-group">
                        <label for="cargo">💼 Cargo</label>
                        <input type="text" id="cargo" required placeholder="Ex: Analista de Sistemas">
                    </div>
                    <div class="form-group full-width">
                        <label for="salario">💰 Salário Bruto (R$)</label>
                        <input type="number" id="salario" step="0.01" required placeholder="Ex: 3500.00">
                    </div>
                    <div class="form-group">
                        <label for="docRG">📄 Cópia do RG/CPF</label>
                        <input type="file" id="docRG" accept=".pdf, image/jpeg, image/png">
                    </div>
                    <div class="form-group">
                        <label for="docCTPS">📘 Carteira de Trabalho</label>
                        <input type="file" id="docCTPS" accept=".pdf, image/jpeg, image/png">
                    </div>
                    <button type="submit" class="btn-cadastrar" id="btnSubmit">✨ Salvar Dados</button>
                </form>
            </div>
        </section>

        <!-- TELA 3: EQUIPE -->
        <section id="tela-equipe" class="aba">
            <div class="table-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2 style="margin-bottom: 0;">Funcionários Cadastrados</h2>
                    <button class="btn-acao" onclick="exportarListaCSV()" style="background-color: #00C4CC; color: white; padding: 12px 20px; box-shadow: 0 4px 12px rgba(0, 196, 204, 0.3);">📥 Exportar Tabela</button>
                </div>
                <table id="tabelaFuncionarios">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Nome</th>
                            <th>Cargo</th>
                            <th>Admissão</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <!-- TELA 4: PERFIL -->
        <section id="tela-perfil" class="aba">
            <div class="header-tela cabecalho-perfil" style="display: flex; justify-content: space-between; align-items: center;">
                <button class="btn-acao btn-voltar" onclick="mudarAba(null, 'tela-equipe')">← Voltar para Equipe</button>
                <button class="btn-acao btn-imprimir" onclick="window.print()">🖨️ Imprimir Ficha</button>
            </div>
            <div class="container" id="conteudo-perfil" style="margin-top: 20px;"></div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>

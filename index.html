<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão RH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU LATERAL -->
    <aside class="sidebar">
        <div class="logo">
            <h2>Meu RH</h2>
        </div>
        <nav class="menu">
            <button class="menu-item ativo" onclick="mudarAba(event, 'tela-dashboard')">Dashboard</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-admissao')">Nova Admissão</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-equipe')">Equipe</button>
        </nav>
    </aside>

    <!-- ÁREA PRINCIPAL ONDE AS TELAS APARECEM -->
    <main class="main-content">

        <!-- TELA 1: DASHBOARD -->
        <section id="tela-dashboard" class="aba ativa">
            <div class="header-tela">
                <h1>Dashboard</h1>
                <p>Visão geral do sistema</p>
            </div>
            <div class="cards-container">
                <div class="card">
                    <h3>Total de Funcionários</h3>
                    <p id="contador-funcionarios">0</p>
                </div>
            </div>
        </section>

        <!-- TELA 2: NOVA ADMISSÃO (Seu formulário atual) -->
        <section id="tela-admissao" class="aba">
            <div class="container">
                <h1>Novo Funcionário</h1>
                <form id="formFuncionario">
                    <div class="form-group full-width">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" required placeholder="Ex: João da Silva">
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" required placeholder="000.000.000-00">
                    </div>
                    <div class="form-group">
                        <label for="dataAdmissao">Data de Admissão</label>
                        <input type="date" id="dataAdmissao" required>
                    </div>
                    <div class="form-group">
                        <label for="departamento">Departamento</label>
                        <input type="text" id="departamento" required placeholder="Ex: Tecnologia">
                    </div>
                    <div class="form-group">
                        <label for="cargo">Cargo</label>
                        <input type="text" id="cargo" required placeholder="Ex: Analista de Sistemas">
                    </div>
                    <div class="form-group full-width">
                        <label for="salario">Salário Bruto (R$)</label>
                        <input type="number" id="salario" step="0.01" required placeholder="Ex: 3500.00">
                    </div>
                    <div class="form-group full-width">
                        <label for="documento">Anexar Documento</label>
                        <input type="file" id="documento" accept=".pdf, image/jpeg, image/png">
                        <small>Formatos aceitos: PDF, JPG ou PNG.</small>
                    </div>
                    <button type="submit" class="btn-cadastrar" id="btnSubmit">Cadastrar Funcionário</button>
                </form>
            </div>
        </section>

        <!-- TELA 3: EQUIPE (Sua tabela atual) -->
        <section id="tela-equipe" class="aba">
            <div class="table-container">
                <h2>Funcionários Cadastrados</h2>
                <table id="tabelaFuncionarios">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Cargo</th>
                            <th>Departamento</th>
                            <th>Admissão</th>
                            <th>Salário</th>
                            <th>Documento</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- O JavaScript vai colocar as linhas aqui -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>

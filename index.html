<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #2d3748;
            display: flex;
            flex-direction: column; /* Alterado para empilhar os elementos */
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Estilos do Formulário */
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 700px;
            margin-bottom: 30px; /* Espaço entre o formulário e a tabela */
        }

        h1, h2 {
            text-align: center;
            color: #1a202c;
            font-weight: 700;
        }

        h1 { margin-bottom: 30px; font-size: 26px; }
        h2 { margin-bottom: 20px; font-size: 22px; }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        input[type="text"], input[type="number"], input[type="date"], input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #2d3748;
            background-color: #f7fafc;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4299e1;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        input[type="file"] { padding: 10px; cursor: pointer; }
        input[type="file"]::file-selector-button {
            background-color: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #4a5568;
            font-weight: 600;
            cursor: pointer;
            margin-right: 15px;
            transition: background-color 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background-color: #e2e8f0; }
        small { margin-top: 6px; color: #718096; font-size: 12px; }

        .btn-cadastrar {
            grid-column: span 2;
            margin-top: 10px;
            padding: 14px;
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
        }

        .btn-cadastrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(66, 153, 225, 0.3);
        }

        /* Estilos da Tabela */
        .table-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 1000px;
            overflow-x: auto; /* Permite rolagem horizontal se a tela for pequena */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 15px 10px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
        }

        th {
            background-color: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        .link-documento {
            color: #3182ce;
            text-decoration: none;
            font-weight: 600;
        }

        .link-documento:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
            .full-width, .btn-cadastrar { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <!-- CAIXA DO FORMULÁRIO -->
    <div class="container">
        <h1>Novo Funcionário</h1>
        <form id="formFuncionario">
            <div class="form-group full-width">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: João da Silva">
            </div>
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00">
            </div>
            <div class="form-group">
                <label for="dataAdmissao">Data de Admissão</label>
                <input type="date" id="dataAdmissao" required>
            </div>
            <div class="form-group">
                <label for="departamento">Departamento</label>
                <input type="text" id="departamento" required placeholder="Ex: Tecnologia">
            </div>
            <div class="form-group">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" required placeholder="Ex: Analista de Sistemas">
            </div>
            <div class="form-group full-width">
                <label for="salario">Salário Bruto (R$)</label>
                <input type="number" id="salario" step="0.01" required placeholder="Ex: 3500.00">
            </div>
            <div class="form-group full-width">
                <label for="documento">Anexar Documento</label>
                <input type="file" id="documento" accept=".pdf, image/jpeg, image/png">
                <small>Formatos aceitos: PDF, JPG ou PNG.</small>
            </div>
            <button type="submit" class="btn-cadastrar">Cadastrar Funcionário</button>
        </form>
    </div>

    <!-- CAIXA DA TABELA (NOVIDADE AQUI!) -->
    <div class="table-container">
        <h2>Funcionários Cadastrados</h2>
        <table id="tabelaFuncionarios">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Cargo</th>
                    <th>Departamento</th>
                    <th>Admissão</th>
                    <th>Salário</th>
                    <th>Documento</th>
                </tr>
            </thead>
            <tbody>
                <!-- O JavaScript vai colocar as linhas aqui dentro -->
            </tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('formFuncionario');

        // FUNÇÃO NOVA: Lê os dados e monta a tabela
        function atualizarTabela() {
            const tbody = document.querySelector('#tabelaFuncionarios tbody');
            tbody.innerHTML = ''; // Limpa a tabela antes de escrever de novo

            // Pega os dados salvos ou cria uma lista vazia
            let funcionariosSalvos = JSON.parse(localStorage.getItem('listaFuncionarios')) || [];

            // Para cada funcionário na lista, cria uma linha (<tr>)
            funcionariosSalvos.forEach(function(func) {
                const tr = document.createElement('tr');

                // Formata a data para o padrão brasileiro (DD/MM/AAAA)
                const partesData = func.dataAdmissao.split('-');
                const dataFormatada = partesData.length === 3 ? `${partesData[2]}/${partesData[1]}/${partesData[0]}` : func.dataAdmissao;

                // Formata o salário para Real (R$)
                const salarioFormatado = parseFloat(func.salario).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                // Verifica se tem documento para criar o link
                let linkDoc = '<span style="color: #a0aec0; font-size: 12px;">Sem anexo</span>';
                if (func.documento) {
                    // Cria um link que permite baixar o arquivo
                    linkDoc = `<a href="${func.documento}" download="doc_${func.nome.replace(/\s+/g, '_')}" class="link-documento">Baixar</a>`;
                }

                // Preenche as colunas (<td>)
                tr.innerHTML = `
                    <td><strong>${func.nome}</strong></td>
                    <td>${func.cpf}</td>
                    <td>${func.cargo}</td>
                    <td>${func.departamento}</td>
                    <td>${dataFormatada}</td>
                    <td>${salarioFormatado}</td>
                    <td>${linkDoc}</td>
                `;

                // Adiciona a linha na tabela
                tbody.appendChild(tr);
            });
        }

        // Chama a função logo que a página carrega para mostrar quem já está salvo
        window.onload = atualizarTabela;

        // Lógica de envio do formulário
        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const dataAdmissao = document.getElementById('dataAdmissao').value;
            const departamento = document.getElementById('departamento').value.trim();
            const cargo = document.getElementById('cargo').value.trim();
            const salario = document.getElementById('salario').value;
            const documentoInput = document.getElementById('documento');

            if (!nome || !cpf || !dataAdmissao || !departamento || !cargo || !salario) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            function salvarDados(documentoBase64 = null) {
                const novoFuncionario = {
                    id: Date.now(),
                    nome: nome,
                    cpf: cpf,
                    dataAdmissao: dataAdmissao,
                    departamento: departamento,
                    cargo: cargo,
                    salario: salario,
                    documento: documentoBase64
                };

                let funcionariosSalvos = JSON.parse(localStorage.getItem('listaFuncionarios')) || [];
                funcionariosSalvos.push(novoFuncionario);
                localStorage.setItem('listaFuncionarios', JSON.stringify(funcionariosSalvos));

                form.reset();
                
                // NOVIDADE AQUI: Atualiza a tabela na mesma hora que cadastra!
                atualizarTabela(); 
            }

            if (documentoInput.files.length > 0) {
                const arquivo = documentoInput.files[0];
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    salvarDados(e.target.result);
                };
                leitor.readAsDataURL(arquivo);
            } else {
                salvarDados(null);
            }
        });
    </script>
</body>
</html>

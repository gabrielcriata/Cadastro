<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão RH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <aside class="sidebar">
        <div class="logo">
            <h2>✨ Meu RH</h2>
        </div>
        <nav class="menu">
            <button class="menu-item ativo" onclick="mudarAba(event, 'tela-dashboard')">📊 Dashboard</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-admissao')">📝 Nova Admissão</button>
            <button class="menu-item" onclick="mudarAba(event, 'tela-equipe')">👥 Equipe</button>
        </nav>
    </aside>

    <main class="main-content">

        <section id="tela-dashboard" class="aba ativa">
            <div class="header-tela">
                <h1>Painel de Controle</h1>
                <p>Gerencie seus dados e lembretes</p>
            </div>
            
            <div class="dashboard-grid">
                <div class="coluna-cards">
                    <div class="card card-destaque">
                        <h3>Total de Funcionários</h3>
                        <div class="numero-circulo circulo-roxo" id="contador-funcionarios">0</div>
                    </div>
                    
                    <div class="card">
                        <h3>💾 Segurança dos Dados</h3>
                        <p style="font-size: 13px; color: #718096; margin-bottom: 15px;">Salve uma cópia de segurança ou restaure seus dados.</p>
                        <div style="display: flex; gap: 10px; flex-direction: column;">
                            <button class="btn-acao" onclick="exportarBackup()" style="background-color: #8B3DFF; color: white; width: 100%;">📤 Exportar Backup (JSON)</button>
                            <label class="btn-acao" style="background-color: #E2E8F0; color: #4A5568; width: 100%; text-align: center; cursor: pointer;">
                                📥 Importar Backup
                                <input type="file" id="importarJson" accept=".json" style="display: none;" onchange="importarBackup(event)">
                            </label>
                        </div>
                    </div>

                    <div class="card">
                        <h3>🎂 Aniversariantes</h3>
                        <ul id="lista-aniversariantes" class="lista-simples"></ul>
                    </div>
                </div>

                <div class="coluna-ferramentas">
                    <div class="card" style="padding: 20px;">
                        <div class="calendario-header">
                            <h3 id="mes-ano-display" style="font-size: 18px; font-weight: 800;">MÊS ANO</h3>
                            <div>
                                <button class="btn-cal" onclick="mudarMes(-1)">&#10094;</button>
                                <button class="btn-cal" onclick="mudarMes(1)">&#10095;</button>
                            </div>
                        </div>
                        <div class="dias-semana">
                            <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
                        </div>
                        <div id="dias-grid" class="dias-grid"></div>
                    </div>

                    <div class="card" id="painel-notas-dia" style="display: none; border-left: 4px solid #00C4CC;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h3 id="titulo-notas-dia" style="color: #00C4CC; font-weight: 800;">Anotações</h3>
                            <button onclick="fecharNotasDia()" style="background:none; border:none; cursor:pointer;">✖</button>
                        </div>
                        <textarea id="texto-nota-dia"></textarea>
                        <button class="btn-acao btn-editar" onclick="salvarNotaDia()" style="width: 100%; padding: 12px; margin-top: 10px;">Salvar</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tela-admissao" class="aba">
            <div class="container">
                <h1>Novo Funcionário</h1>
                <form id="formFuncionario">
                    <div class="form-group full-width">
                        <label for="nome">👤 Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">🆔 CPF</label>
                        <input type="text" id="cpf" required maxlength="14">
                    </div>
                    <div class="form-group">
                        <label for="dataNascimento">🎈 Nascimento</label>
                        <input type="date" id="dataNascimento" required>
                    </div>
                    <div class="form-group">
                        <label for="dataAdmissao">📅 Admissão</label>
                        <input type="date" id="dataAdmissao" required>
                    </div>
                    <div class="form-group">
                        <label for="statusFunc">🟢 Status</label>
                        <select id="statusFunc" required>
                            <option value="Ativo">Ativo</option>
                            <option value="Férias">De Férias</option>
                            <option value="Afastado">Afastado</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="departamento">🏢 Departamento</label>
                        <input type="text" id="departamento" required>
                    </div>
                    <div class="form-group">
                        <label for="cargo">💼 Cargo</label>
                        <input type="text" id="cargo" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="salario">💰 Salário Bruto</label>
                        <input type="text" id="salario" required>
                    </div>
                    <div class="form-group">
                        <label for="docRG">📄 RG/CPF</label>
                        <input type="file" id="docRG">
                    </div>
                    <div class="form-group">
                        <label for="docCTPS">📘 Carteira Trab.</label>
                        <input type="file" id="docCTPS">
                    </div>
                    <button type="submit" class="btn-cadastrar" id="btnSubmit">✨ Salvar Dados</button>
                </form>
            </div>
        </section>

        <section id="tela-equipe" class="aba">
            <div class="table-container">
                <div class="header-tabela-flex">
                    <h2>Funcionários</h2>
                    <div class="busca-container">
                        <input type="text" id="inputBusca" placeholder="🔍 Pesquisar por nome ou CPF..." onkeyup="filtrarTabela()">
                    </div>
                    <button class="btn-acao" onclick="exportarListaCSV()" style="background-color: #00C4CC; color: white;">📥 Excel</button>
                </div>
                <table id="tabelaFuncionarios">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Nome</th>
                            <th>Cargo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <section id="tela-perfil" class="aba">
            <div class="header-tela cabecalho-perfil">
                <button class="btn-acao btn-voltar" onclick="mudarAba(null, 'tela-equipe')">← Voltar</button>
                <button class="btn-acao btn-imprimir" onclick="window.print()">🖨️ Imprimir</button>
            </div>
            <div class="container" id="conteudo-perfil" style="margin-top: 20px;"></div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <!-- Importando uma fonte moderna do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Fundo com um gradiente moderno e suave */
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #1a202c;
            font-weight: 700;
            font-size: 26px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* Fazendo campos específicos ocuparem as duas colunas */
        .full-width {
            grid-column: span 2;
        }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #2d3748;
            background-color: #f7fafc;
            transition: all 0.3s ease;
        }

        /* Efeito ao clicar no campo */
        input:focus {
            outline: none;
            border-color: #4299e1;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        /* Estilizando o botão padrão de arquivo do navegador */
        input[type="file"]::file-selector-button {
            background-color: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #4a5568;
            font-weight: 600;
            cursor: pointer;
            margin-right: 15px;
            transition: background-color 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background-color: #e2e8f0;
        }

        small {
            margin-top: 6px;
            color: #718096;
            font-size: 12px;
        }

        .btn-cadastrar {
            grid-column: span 2;
            margin-top: 10px;
            padding: 14px;
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
        }

        .btn-cadastrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(66, 153, 225, 0.3);
        }

        .btn-cadastrar:active {
            transform: translateY(0);
        }

        /* Responsividade: Volta para 1 coluna em telas de celular */
        @media (max-width: 600px) {
            form {
                grid-template-columns: 1fr;
            }
            .full-width, .btn-cadastrar {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Novo Funcionário</h1>
        
        <form id="formFuncionario">
            <div class="form-group full-width">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: João da Silva">
            </div>

            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00">
            </div>

            <div class="form-group">
                <label for="dataAdmissao">Data de Admissão</label>
                <input type="date" id="dataAdmissao" required>
            </div>

            <div class="form-group">
                <label for="departamento">Departamento</label>
                <input type="text" id="departamento" required placeholder="Ex: Tecnologia">
            </div>

            <div class="form-group">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" required placeholder="Ex: Analista de Sistemas">
            </div>

            <div class="form-group full-width">
                <label for="salario">Salário Bruto (R$)</label>
                <input type="number" id="salario" step="0.01" required placeholder="Ex: 3500.00">
            </div>

            <div class="form-group full-width">
                <label for="documento">Anexar Documento</label>
                <input type="file" id="documento" accept=".pdf, image/jpeg, image/png">
                <small>Formatos aceitos: PDF, JPG ou PNG.</small>
            </div>

            <button type="submit" class="btn-cadastrar">Cadastrar Funcionário</button>
        </form>
    </div>

    <!-- Script com a lógica de salvamento -->
    <script>
        // 1. Selecionamos o formulário pelo ID
        const form = document.getElementById('formFuncionario');

        // 2. Criamos um evento que "escuta" quando o botão de submit for clicado
        form.addEventListener('submit', function(event) {
            // Impede que a página recarregue (comportamento padrão do formulário)
            event.preventDefault();

            // 3. Capturamos os valores digitados nos campos
            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const dataAdmissao = document.getElementById('dataAdmissao').value;
            const departamento = document.getElementById('departamento').value.trim();
            const cargo = document.getElementById('cargo').value.trim();
            const salario = document.getElementById('salario').value;
            const documentoInput = document.getElementById('documento');

            // 4. Validação básica (garante que nada importante está vazio)
            if (!nome || !cpf || !dataAdmissao || !departamento || !cargo || !salario) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return; // Para a execução se algo estiver faltando
            }

            // 5. Função para salvar os dados (com ou sem arquivo)
            function salvarDados(documentoBase64 = null) {
                // Cria um "molde" (objeto) com os dados do funcionário
                const novoFuncionario = {
                    id: Date.now(), // Cria um ID único baseado no horário
                    nome: nome,
                    cpf: cpf,
                    dataAdmissao: dataAdmissao,
                    departamento: departamento,
                    cargo: cargo,
                    salario: salario,
                    documento: documentoBase64 // Salva o arquivo convertido (ou null)
                };

                // 6. Busca os funcionários que já estão salvos no localStorage
                // Se não houver nenhum, cria um array vazio []
                let funcionariosSalvos = JSON.parse(localStorage.getItem('listaFuncionarios')) || [];

                // 7. Adiciona o novo funcionário na lista
                funcionariosSalvos.push(novoFuncionario);

                // 8. Salva a lista atualizada de volta no localStorage
                // (Precisamos converter para texto usando JSON.stringify)
                localStorage.setItem('listaFuncionarios', JSON.stringify(funcionariosSalvos));

                alert('Funcionário cadastrado com sucesso!');
                
                // 9. Limpa o formulário para o próximo cadastro
                form.reset();
            }

            // 10. Lógica para processar o arquivo (se o usuário selecionou um)
            if (documentoInput.files.length > 0) {
                const arquivo = documentoInput.files[0];
                const leitor = new FileReader();
                
                // Quando o leitor terminar de ler o arquivo, ele executa esta função
                leitor.onload = function(e) {
                    const resultadoBase64 = e.target.result;
                    salvarDados(resultadoBase64); // Chama a função de salvar passando o arquivo convertido
                };
                
                // Manda ler o arquivo como uma URL de dados (Base64)
                leitor.readAsDataURL(arquivo);
            } else {
                // Se nenhum arquivo foi selecionado, salva apenas os dados de texto
                salvarDados(null);
            }
        });
    </script>
</body>
</html>

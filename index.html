<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionários</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: #2d3748;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container, .table-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            margin-bottom: 30px;
        }

        .container { max-width: 700px; }
        .table-container { max-width: 1000px; overflow-x: auto; }

        h1, h2 {
            text-align: center;
            color: #1a202c;
            font-weight: 700;
        }

        h1 { margin-bottom: 30px; font-size: 26px; }
        h2 { margin-bottom: 20px; font-size: 22px; }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }

        label {
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #4a5568;
        }

        input[type="text"], input[type="number"], input[type="date"], input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #2d3748;
            background-color: #f7fafc;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4299e1;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        input[type="file"] { padding: 10px; cursor: pointer; }
        input[type="file"]::file-selector-button {
            background-color: #edf2f7;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            color: #4a5568;
            font-weight: 600;
            cursor: pointer;
            margin-right: 15px;
            transition: background-color 0.2s;
        }
        input[type="file"]::file-selector-button:hover { background-color: #e2e8f0; }
        small { margin-top: 6px; color: #718096; font-size: 12px; }

        .btn-cadastrar {
            grid-column: span 2;
            margin-top: 10px;
            padding: 14px;
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(66, 153, 225, 0.2);
        }

        .btn-cadastrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(66, 153, 225, 0.3);
        }

        /* Estilos da Tabela e Botões de Ação */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            min-width: 800px; /* Garante que não fique espremido */
        }

        th, td {
            padding: 15px 10px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
        }

        th {
            background-color: #f7fafc;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        tr:hover { background-color: #f8fafc; }

        .link-documento { color: #3182ce; text-decoration: none; font-weight: 600; }
        .link-documento:hover { text-decoration: underline; }

        /* Botões de Editar e Excluir */
        .acoes-container {
            display: flex;
            gap: 8px;
        }

        .btn-acao {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: background-color 0.2s;
        }

        .btn-editar { background-color: #f6ad55; }
        .btn-editar:hover { background-color: #dd6b20; }

        .btn-excluir { background-color: #fc8181; }
        .btn-excluir:hover { background-color: #e53e3e; }

        @media (max-width: 600px) {
            form { grid-template-columns: 1fr; }
            .full-width, .btn-cadastrar { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Novo Funcionário</h1>
        <form id="formFuncionario">
            <div class="form-group full-width">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: João da Silva">
            </div>
            <div class="form-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00">
            </div>
            <div class="form-group">
                <label for="dataAdmissao">Data de Admissão</label>
                <input type="date" id="dataAdmissao" required>
            </div>
            <div class="form-group">
                <label for="departamento">Departamento</label>
                <input type="text" id="departamento" required placeholder="Ex: Tecnologia">
            </div>
            <div class="form-group">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" required placeholder="Ex: Analista de Sistemas">
            </div>
            <div class="form-group full-width">
                <label for="salario">Salário Bruto (R$)</label>
                <input type="number" id="salario" step="0.01" required placeholder="Ex: 3500.00">
            </div>
            <div class="form-group full-width">
                <label for="documento">Anexar Documento</label>
                <input type="file" id="documento" accept=".pdf, image/jpeg, image/png">
                <small>Formatos aceitos: PDF, JPG ou PNG.</small>
            </div>
            <button type="submit" class="btn-cadastrar" id="btnSubmit">Cadastrar Funcionário</button>
        </form>
    </div>

    <div class="table-container">
        <h2>Funcionários Cadastrados</h2>
        <table id="tabelaFuncionarios">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>Cargo</th>
                    <th>Departamento</th>
                    <th>Admissão</th>
                    <th>Salário</th>
                    <th>Documento</th>
                    <th>Ações</th> <!-- Nova coluna -->
                </tr>
            </thead>
            <tbody>
                <!-- O JavaScript vai colocar as linhas aqui -->
            </tbody>
        </table>
    </div>

    <script>
        const form = document.getElementById('formFuncionario');
        const btnSubmit = document.getElementById('btnSubmit');
        
        // NOVIDADE: Variável para saber se estamos criando ou editando
        let idEditando = null;

        function atualizarTabela() {
            const tbody = document.querySelector('#tabelaFuncionarios tbody');
            tbody.innerHTML = ''; 

            let funcionariosSalvos = JSON.parse(localStorage.getItem('listaFuncionarios')) || [];

            funcionariosSalvos.forEach(function(func) {
                const tr = document.createElement('tr');

                const partesData = func.dataAdmissao.split('-');
                const dataFormatada = partesData.length === 3 ? `${partesData[2]}/${partesData[1]}/${partesData[0]}` : func.dataAdmissao;
                const salarioFormatado = parseFloat(func.salario).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                let linkDoc = '<span style="color: #a0aec0; font-size: 12px;">Sem anexo</span>';
                if (func.documento) {
                    linkDoc = `<a href="${func.documento}" download="doc_${func.nome.replace(/\s+/g, '_')}" class="link-documento">Baixar</a>`;
                }

                // NOVIDADE: Adicionado a div de ações com os botões Editar e Excluir
                tr.innerHTML = `
                    <td><strong>${func.nome}</strong></td>
                    <td>${func.cpf}</td>
                    <td>${func.cargo}</td>
                    <td>${func.departamento}</td>
                    <td>${dataFormatada}</td>
                    <td>${salarioFormatado}</td>
                    <td>${linkDoc}</td>
                    <td>
                        <div class="acoes-container">
                            <button class="btn-acao btn-editar" onclick="prepararEdicao(${func.id})">Editar</button>
                            <button class="btn-acao btn-excluir" onclick="excluirFuncionario(${func.id})">Excluir</button>
                        </div>
                    </td>
                `;

                tbody.appendChild(tr);
            });
        }

        // NOVIDADE: Função para excluir funcionário
        function excluirFuncionario(id) {
            if (confirm("Tem certeza que deseja excluir este funcionário?")) {
                let funcionariosSalvos = JSON.parse(localStorage.getItem('listaFuncionarios')) || [];
                // Filtra a lista, mantendo apenas quem tem o ID diferente do que foi clicado
                funcionariosSalvos = funcionariosSalvos.filter(func => func.id !== id);
                // Salva a nova lista no localStorage
                localStorage.setItem('listaFuncionarios', JSON.stringify(funcionariosSalvos));
                // Atualiza a tabela na tela
                atualizarTabela();
            }
        }

        // NOVIDADE: Função para preparar o formulário para edição
        function prepararEdicao(id) {
            let funcionariosSalvos = JSON.parse(localStorage.getItem('listaFuncionarios')) || [];
            // Busca o funcionário específico pelo ID
            const func = funcionariosSalvos.find(f => f.id === id);

            if (func) {
                // Preenche o formulário com os dados antigos
                document.getElementById('nome').value = func.nome;
                document.getElementById('cpf').value = func.cpf;
                document.getElementById('dataAdmissao').value = func.dataAdmissao;
                document.getElementById('departamento').value = func.departamento;
                document.getElementById('cargo').value = func.cargo;
                document.getElementById('salario').value = func.salario;
                
                // Nota: Por questões de segurança do navegador, não podemos preencher o campo de arquivo (input file)
                
                // Muda a variável avisando que agora é uma edição
                idEditando = id;
                
                // Muda o texto do botão e rola a tela para o topo
                btnSubmit.textContent = "Salvar Alterações";
                btnSubmit.style.background = "linear-gradient(135deg, #f6ad55 0%, #ed8936 100%)"; // Fica laranja
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.onload = atualizarTabela;

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const cpf = document.getElementById('cpf').value.trim();
            const dataAdmissao = document.getElementById('dataAdmissao').value;
            const departamento = document.getElementById('departamento').value.trim();
            const cargo = document.getElementById('cargo').value.trim();
            const salario = document.getElementById('salario').value;
            const documentoInput = document.getElementById('documento');

            if (!nome || !cpf || !dataAdmissao || !departamento || !cargo || !salario) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            function salvarDados(documentoBase64 = null) {
                let funcionariosSalvos = JSON.parse(localStorage.getItem('listaFuncionarios')) || [];

                if (idEditando === null) {
                    // É UM NOVO CADASTRO
                    const novoFuncionario = {
                        id: Date.now(),
                        nome: nome,
                        cpf: cpf,
                        dataAdmissao: dataAdmissao,
                        departamento: departamento,
                        cargo: cargo,
                        salario: salario,
                        documento: documentoBase64
                    };
                    funcionariosSalvos.push(novoFuncionario);
                } else {
                    // É UMA EDIÇÃO
                    // Encontra a posição do funcionário na lista
                    const index = funcionariosSalvos.findIndex(f => f.id === idEditando);
                    if (index !== -1) {
                        funcionariosSalvos[index].nome = nome;
                        funcionariosSalvos[index].cpf = cpf;
                        funcionariosSalvos[index].dataAdmissao = dataAdmissao;
                        funcionariosSalvos[index].departamento = departamento;
                        funcionariosSalvos[index].cargo = cargo;
                        funcionariosSalvos[index].salario = salario;
                        // Só atualiza o documento se o usuário escolheu um novo arquivo
                        if (documentoBase64) {
                            funcionariosSalvos[index].documento = documentoBase64;
                        }
                    }
                    
                    // Reseta as variáveis de edição
                    idEditando = null;
                    btnSubmit.textContent = "Cadastrar Funcionário";
                    btnSubmit.style.background = "linear-gradient(135deg, #4299e1 0%, #3182ce 100%)";
                }

                localStorage.setItem('listaFuncionarios', JSON.stringify(funcionariosSalvos));
                form.reset();
                atualizarTabela(); 
            }

            if (documentoInput.files.length > 0) {
                const arquivo = documentoInput.files[0];
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    salvarDados(e.target.result);
                };
                leitor.readAsDataURL(arquivo);
            } else {
                salvarDados(null);
            }
        });
    </script>
</body>
</html>
